GPUS: [0]
WORKERS: 8


DATASET:
  NAME: mooc
  ROOT: 'data'
  NUM_NEIGHBORRS: [15,10,5]
  NUM_TIMESLOTS: 3
  ZERO_EDGE: False


TRAIN:
  BATCH_SIZE_PER_GPU: 256
  SHUFFLE: True
  EPOCH: 35
  OPTIMIZER: 'adam'
  LR_TYPE: 'multistep'
  LR: 1e-4  # 1e-4
  LR_STEP: [80,100]
  ERROR: 0.01
  LOSS:
    TAU: 0.02
    ALPHA: 1
    BETA: 1
    NUM_NEGATIVES: 64


TEST:
  BATCH_SIZE_PER_GPU: 256
  SHUFFLE: False
  SAVE_WEIGHT: True


MODEL:
  NAME: 'TAG-AD'
  INIT_WEIGHTS: True
  NUM_LAYERS : 3
  HIDDEN_CHANNELS: 128
  HEADS: 8
  DROPOUT: 0.3 # 0.7

